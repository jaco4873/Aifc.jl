name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  test:
    name: Julia ${{ matrix.version }} — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'   # minimum supported (matches ActionModels 0.7)
          - '1'      # current stable
        os:
          - ubuntu-latest
          - macos-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
        # Coverage upload only on the canonical matrix entry to avoid
        # double-counting (Codecov merges multiple uploads but it's noisy).
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1'
      - uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1'
        with:
          file: lcov.info
          fail_ci_if_error: false
        env:
          # CODECOV_TOKEN is optional for public repos (codecov-action@v4
          # uses OIDC). Set the secret for private repos.
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
